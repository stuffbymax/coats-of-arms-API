<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Coats of Arms{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --crimson: #8b1a1a;
            --ink: #1a1209;
            --parchment: #f5edd8;
            --parchment-dark: #e8d9b8;
            --border: #b89a4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Crimson Pro', serif;
            background-color: var(--ink);
            background-image:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 40px,
                    rgba(201,168,76,0.04) 40px,
                    rgba(201,168,76,0.04) 41px
                );
            color: var(--parchment);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(180deg, #0d0a04 0%, #1e1508 100%);
            border-bottom: 2px solid var(--gold);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
        }

        header a.logo {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 0.08em;
            text-shadow: 0 0 20px rgba(201,168,76,0.4);
        }

        header a.logo span {
            color: var(--gold-light);
            font-weight: 400;
            font-size: 0.85rem;
            display: block;
            letter-spacing: 0.2em;
        }

        nav a {
            color: var(--parchment-dark);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            margin-left: 2rem;
            transition: color 0.2s;
        }
        nav a:hover { color: var(--gold); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .ornament {
            text-align: center;
            color: var(--gold);
            font-size: 1.5rem;
            letter-spacing: 0.5em;
            margin: 1rem 0;
            opacity: 0.6;
        }

        /* Search bar */
        .search-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 0.75rem 1rem;
        }
        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            color: var(--parchment);
            font-family: 'Crimson Pro', serif;
            font-size: 1.1rem;
            outline: none;
        }
        .search-bar input::placeholder { color: rgba(245,237,216,0.3); }
        .search-bar button {
            background: var(--gold);
            color: var(--ink);
            border: none;
            padding: 0.4rem 1.2rem;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-bar button:hover { background: var(--gold-light); }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: linear-gradient(160deg, #1e1810 0%, #150f07 100%);
            border: 1px solid rgba(201,168,76,0.3);
            text-decoration: none;
            color: var(--parchment);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 1rem;
            transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 16px rgba(201,168,76,0.15);
        }

        .card img {
            width: 100px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }

        .card-name {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-align: center;
            color: var(--gold-light);
        }

        .card-motto {
            font-style: italic;
            font-size: 0.75rem;
            color: rgba(245,237,216,0.45);
            text-align: center;
            margin-top: 0.3rem;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            padding: 0.5rem 1.4rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-gold {
            background: var(--gold);
            color: var(--ink);
        }
        .btn-gold:hover { background: var(--gold-light); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--parchment-dark);
        }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
        .btn-danger {
            background: transparent;
            border: 1px solid #8b1a1a;
            color: #c44;
        }
        .btn-danger:hover { background: #8b1a1a; color: var(--parchment); }

        /* Page heading */
        .page-title {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 2rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            text-shadow: 0 0 30px rgba(201,168,76,0.3);
            margin-bottom: 0.25rem;
        }
        .page-subtitle {
            color: rgba(245,237,216,0.4);
            font-style: italic;
            margin-bottom: 2rem;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            color: var(--gold);
            margin-bottom: 0.4rem;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--parchment);
            font-family: 'Crimson Pro', serif;
            font-size: 1rem;
            padding: 0.55rem 0.8rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus { border-color: var(--gold); }
        .form-group textarea { resize: vertical; min-height: 90px; }

        .checkbox-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .checkbox-group label {
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            color: var(--parchment-dark);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
        }
        .checkbox-group input[type=checkbox] { width: auto; }

        .form-card {
            background: linear-gradient(160deg, #1e1810 0%, #150f07 100%);
            border: 1px solid rgba(201,168,76,0.25);
            padding: 2rem;
            max-width: 640px;
        }

        /* Detail page */
        .detail-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 3rem;
            align-items: start;
        }
        .detail-image img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.7));
        }
        .detail-meta dt {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--gold);
            margin-top: 1rem;
        }
        .detail-meta dd {
            font-size: 1rem;
            color: var(--parchment);
            margin-top: 0.2rem;
        }
        .tag {
            display: inline-block;
            background: rgba(201,168,76,0.15);
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            padding: 0.2rem 0.6rem;
            margin: 0.2rem 0.2rem 0 0;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(201,168,76,0.2);
            margin: 2rem 0;
        }

        .action-bar {
            display: flex;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: rgba(245,237,216,0.3);
            font-style: italic;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            coats
            <span>Coats of Arms Collection</span>
        </a>
        <nav>
            <a href="/">Collection</a>
            <a href="/add">+ Add Entry</a>
            <a href="/api/items">API</a>
            <a href="/about">About</a>
            <a href="/docs">Docs</a>
            <a href="/fun-facts">Fun Facts</a>
            <a href="/admin">admin</a>
            {% if g.user %}
                <a href="{{ url_for('profile') }}">My Profile</a>
                <a href="{{ url_for('add') }}">Add Item</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('signup') }}">Sign Up</a>
            {% endif %}
        </nav>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
