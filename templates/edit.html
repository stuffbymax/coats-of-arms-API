{% extends "base.html" %}
{% block title %}Edit {{ item.name }} — coats{% endblock %}
{% block content %}

<div style="margin: 2rem 0 1rem;">
    <a href="/item/{{ item.id }}" class="btn btn-outline" style="font-size:0.7rem">← Back to {{ item.name }}</a>
</div>

<h1 class="page-title">Edit Entry</h1>
<p class="page-subtitle">{{ item.name }}</p>

<div class="form-card">
    <form method="POST" action="/edit/{{ item.id }}">

        <div class="form-group">
            <label>Name *</label>
            <input type="text" name="name" required value="{{ item.name }}">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
                <label>Motto (Latin)</label>
                <input type="text" name="motto_latin" value="{{ item.motto_latin or '' }}">
            </div>
            <div class="form-group">
                <label>Motto (English)</label>
                <input type="text" name="motto_english" value="{{ item.motto_english or '' }}">
            </div>
        </div>

        <div class="form-group">
            <label>Colors <span style="opacity:0.5;font-size:0.65rem">(comma-separated)</span></label>
            <input type="text" name="colors" value="{{ colors | join(', ') }}">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
                <label>Shield Shape</label>
                <input type="text" name="shield_shape" value="{{ item.shield_shape or '' }}">
            </div>
            <div class="form-group">
                <label>Founded / Created</label>
                <input type="text" name="created_at" value="{{ item.created_at or '' }}">
            </div>
        </div>

        <div class="form-group">
            <label>Designer</label>
            <input type="text" name="designer" value="{{ item.designer or '' }}">
        </div>

        <div class="form-group">
            <label>Image URL</label>
            <input type="url" name="image" value="{{ item.image or '' }}">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description">{{ item.description or '' }}</textarea>
        </div>

        <div class="form-group">
            <label>Official Usage</label>
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="usage_official_documents" value="1"
                        {{ 'checked' if item.usage_official_documents }}>
                    Official Documents
                </label>
                <label>
                    <input type="checkbox" name="usage_flags" value="1"
                        {{ 'checked' if item.usage_flags }}>
                    Flags
                </label>
                <label>
                    <input type="checkbox" name="usage_seal" value="1"
                        {{ 'checked' if item.usage_seal }}>
                    Seal
                </label>
            </div>
        </div>

        <hr class="divider">
        <div style="display:flex;gap:0.75rem">
            <button type="submit" class="btn btn-gold">Save Changes</button>
            <a href="/item/{{ item.id }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
